<!DOCTYPE html>
<html>
<head>
    <title>Stopwatch</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Stopwatch</h1>

        <div id="display">
            00:00:00
        </div>

        <div class="buttons">
            <button id="start">Start</button>
            <button id="pause">Pause</button>
            
            <button id="reset">Reset</button>
            <button id="lap">Lap</button>
        </div>
    </div>

    <script src="script.js"></script>


<ul id="laps"></ul>
</body>
</html>
